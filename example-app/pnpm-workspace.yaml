# pnpm 11 reads package-manager settings from here (the `pnpm` field in package.json is no longer honoured). We
# explicitly allow the dependency build scripts this app needs so `pnpm install` doesn't leave them ignored — otherwise
# pnpm exits non-zero and trips Angular's dependency-status preflight. esbuild powers the Angular build; sharp is used
# by @capacitor/assets to generate launcher icons / splash screens.
#
# nodeLinker: hoisted gives a flat node_modules so Capacitor can discover each plugin's native android/ and ios/ folders
# during `cap sync` (pnpm's default symlinked layout hides them). pnpm 11 reads this here; the .npmrc node-linker entry
# is kept for older pnpm/tooling.
nodeLinker: hoisted

# verifyDepsBeforeRun: false disables pnpm 11's pre-run dependency check. The Dockerfile installs dependencies once in a
# dedicated, cached layer (pnpm install --frozen-lockfile); without this, every later `pnpm run` / `pnpm exec` re-checks
# node_modules, decides it is stale, and launches an implicit reinstall that tries to purge node_modules — which aborts
# in Docker because there is no TTY to confirm (ERR_PNPM_ABORTED_REMOVE_MODULES_DIR_NO_TTY). We control installation
# explicitly, so the build script should just use what is already installed.
verifyDepsBeforeRun: false

allowBuilds:
  '@parcel/watcher': true
  esbuild: true
  lmdb: true
  msgpackr-extract: true
  sharp: true
