# Android release signing for the Capacitor build (the Capacitor analogue of Cordova's build.json). The Docker build
# sources these values and passes them to Gradle as injected signing properties (-Pandroid.injected.signing.*), so the
# generated android/ project is signed without hand-editing build.gradle.
#
# DEMO KEY ONLY — keys/android.jks and these passwords are committed for the example build. A real app must generate its
# own keystore, keep it OUT of version control, and supply these values from CI secrets / the environment instead.
#
# storeFile is resolved relative to the example-app root.
storeFile=keys/android.jks
storePassword=Changeit
keyAlias=alias_name
keyPassword=Changeit
